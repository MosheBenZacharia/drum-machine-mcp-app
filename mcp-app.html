<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Drum Machine</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/15.0.4/Tone.js"></script>
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <select id="preset-select" class="preset-select">
          <option value="custom">Custom</option>
          <option value="boom-bap" selected>Boom Bap</option>
          <option value="house">House</option>
          <option value="techno">Techno</option>
          <option value="reggaeton">Reggaeton</option>
          <option value="dnb">Drum & Bass</option>
          <option value="rock">Rock</option>
        </select>
        <canvas id="oscilloscope" width="120" height="36"></canvas>
      </div>
      <div class="header-controls">
        <div class="bpm-control">
          <button id="bpm-down" class="bpm-btn" aria-label="Decrease BPM">-</button>
          <span id="bpm-display" class="bpm-display">120</span>
          <button id="bpm-up" class="bpm-btn" aria-label="Increase BPM">+</button>
          <span class="control-label">BPM</span>
        </div>
        <div class="swing-control">
          <input type="range" id="swing-slider" min="0" max="100" value="0" class="slider">
          <span class="control-label">SWING <span id="swing-value">0%</span></span>
        </div>
      </div>
    </header>

    <div id="sequencer-grid"></div>

    <footer id="transport">
      <button id="play-btn" class="transport-btn play-btn" aria-label="Play">
        <svg id="play-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <polygon points="6,3 20,12 6,21"/>
        </svg>
        <svg id="stop-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor" style="display:none">
          <rect x="5" y="5" width="14" height="14" rx="2"/>
        </svg>
      </button>
      <button id="clear-btn" class="transport-btn clear-btn">CLEAR</button>
      <span class="hint-text">SHIFT+CLICK = ACCENT</span>
      <div class="volume-control">
        <span class="control-label">VOL</span>
        <input type="range" id="volume-slider" min="0" max="100" value="75" class="slider volume-slider">
      </div>
    </footer>
  </div>
  <script type="module" src="/src/mcp-app.ts"></script>
</body>
</html>
